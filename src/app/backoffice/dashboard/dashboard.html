<!-- Page header -->
<div class="mb-6">
  <h1 class="text-2xl font-bold text-zinc-800">Tableau de bord</h1>
  <p class="text-sm text-zinc-500 mt-1">Bienvenue dans l'espace administration de Tremplin Jeunes Solistes.</p>
</div>

<!-- Stats cards -->
<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5 mb-8">
  <div *ngFor="let stat of stats" class="bg-white rounded-xl shadow-sm border border-zinc-200 p-5 flex items-center gap-4">
    <div [class]="stat.color + ' h-12 w-12 rounded-lg flex items-center justify-center shrink-0'">
      <!-- request icon -->
      <svg *ngIf="stat.icon === 'request'" class="h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      <!-- artists icon -->
      <svg *ngIf="stat.icon === 'artists'" class="h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <!-- hosts icon -->
      <svg *ngIf="stat.icon === 'hosts'" class="h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <!-- events icon -->
      <svg *ngIf="stat.icon === 'events'" class="h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <div>
      <p class="text-2xl font-bold text-zinc-800">{{ stat.value }}</p>
      <p class="text-sm text-zinc-500 mt-0.5">{{ stat.label }}</p>
    </div>
  </div>
</div>

<!-- Quick access grid -->
<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">

  <a routerLink="/backoffice/event-requests"
    class="bg-white border border-zinc-200 rounded-xl p-6 flex flex-col items-start gap-3 hover:shadow-md hover:border-amber-400 transition-all duration-200 group">
    <div class="h-10 w-10 rounded-lg bg-amber-50 flex items-center justify-center group-hover:bg-amber-500 transition-colors duration-200">
      <svg class="h-5 w-5 text-amber-500 group-hover:text-white transition-colors duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
    </div>
    <div>
      <h3 class="font-semibold text-zinc-800 text-sm">Demandes d'événements</h3>
      <p class="text-xs text-zinc-400 mt-0.5">Gérer les demandes reçues</p>
    </div>
  </a>

  <a routerLink="/backoffice/artists"
    class="bg-white border border-zinc-200 rounded-xl p-6 flex flex-col items-start gap-3 hover:shadow-md hover:border-blue-400 transition-all duration-200 group">
    <div class="h-10 w-10 rounded-lg bg-blue-50 flex items-center justify-center group-hover:bg-blue-600 transition-colors duration-200">
      <svg class="h-5 w-5 text-blue-600 group-hover:text-white transition-colors duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>
    <div>
      <h3 class="font-semibold text-zinc-800 text-sm">Artistes</h3>
      <p class="text-xs text-zinc-400 mt-0.5">TJS &amp; artistes invités</p>
    </div>
  </a>

  <a routerLink="/backoffice/hosts"
    class="bg-white border border-zinc-200 rounded-xl p-6 flex flex-col items-start gap-3 hover:shadow-md hover:border-emerald-400 transition-all duration-200 group">
    <div class="h-10 w-10 rounded-lg bg-emerald-50 flex items-center justify-center group-hover:bg-emerald-600 transition-colors duration-200">
      <svg class="h-5 w-5 text-emerald-600 group-hover:text-white transition-colors duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div>
      <h3 class="font-semibold text-zinc-800 text-sm">Hôtes</h3>
      <p class="text-xs text-zinc-400 mt-0.5">Gérer les hôtes enregistrés</p>
    </div>
  </a>

  <a routerLink="/backoffice/events"
    class="bg-white border border-zinc-200 rounded-xl p-6 flex flex-col items-start gap-3 hover:shadow-md hover:border-red-400 transition-all duration-200 group">
    <div class="h-10 w-10 rounded-lg bg-red-50 flex items-center justify-center group-hover:bg-red-600 transition-colors duration-200">
      <svg class="h-5 w-5 text-red-600 group-hover:text-white transition-colors duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <div>
      <h3 class="font-semibold text-zinc-800 text-sm">Événements</h3>
      <p class="text-xs text-zinc-400 mt-0.5">Consulter les événements</p>
    </div>
  </a>

</div>
