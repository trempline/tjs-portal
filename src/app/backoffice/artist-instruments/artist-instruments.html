<div class="space-y-6">
  <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
    <div>
      <h1 class="text-2xl font-bold text-zinc-900">Instruments</h1>
      <p class="mt-0.5 text-sm text-zinc-500">Maintain the instruments connected to your artist profile.</p>
    </div>

    <div *ngIf="!isLoading" class="flex items-center gap-3">
      <button
        *ngIf="!isEditing"
        type="button"
        (click)="startEditing()"
        class="rounded-xl bg-zinc-900 px-5 py-2.5 text-sm font-semibold text-white transition-colors hover:bg-zinc-800"
      >
        Edit
      </button>

      <ng-container *ngIf="isEditing">
        <button
          type="button"
          (click)="cancelEditing()"
          class="rounded-xl border border-zinc-300 px-5 py-2.5 text-sm font-semibold text-zinc-700 transition-colors hover:bg-zinc-50"
        >
          Cancel
        </button>
        <button
          type="button"
          (click)="save()"
          [disabled]="isSaving"
          class="rounded-xl bg-red-600 px-5 py-2.5 text-sm font-semibold text-white transition-colors hover:bg-red-700 disabled:cursor-not-allowed disabled:opacity-60"
        >
          {{ isSaving ? 'Saving...' : 'Save Instruments' }}
        </button>
      </ng-container>
    </div>
  </div>

  <div *ngIf="successMessage" class="rounded-xl border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700">
    {{ successMessage }}
  </div>

  <div *ngIf="error" class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
    {{ error }}
  </div>

  <div *ngIf="isLoading" class="flex items-center justify-center py-20">
    <div class="h-8 w-8 animate-spin rounded-full border-4 border-zinc-200 border-t-red-600"></div>
  </div>

  <div *ngIf="!isLoading" class="rounded-2xl border border-zinc-200 bg-white p-6 shadow-sm">
    <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
      <div>
        <h2 class="text-lg font-semibold text-zinc-900">Selected Instruments</h2>
        <p class="mt-1 text-sm text-zinc-500">Artist can select multiple instruments one by one from the system list.</p>
      </div>

      <div class="flex gap-2">
        <select [(ngModel)]="selectedInstrumentId" [disabled]="!isEditing" class="min-w-64 rounded-xl border border-zinc-300 px-3 py-2.5 text-sm outline-none transition-colors focus:border-red-500 focus:ring-2 focus:ring-red-100 disabled:cursor-not-allowed disabled:bg-zinc-100 disabled:text-zinc-500">
          <option value="">Select instrument</option>
          <option *ngFor="let option of instrumentOptions; trackBy: trackByInstrument" [value]="option.id">{{ option.name }}</option>
        </select>
        <button type="button" (click)="addInstrument()" [disabled]="!isEditing" class="rounded-xl bg-red-600 px-4 py-2.5 text-sm font-medium text-white transition-colors hover:bg-red-700 disabled:cursor-not-allowed disabled:opacity-60">
          Add
        </button>
      </div>
    </div>

    <div *ngIf="selectedInstruments.length > 0; else emptyState" class="mt-5 flex flex-wrap gap-2">
      <span *ngFor="let item of selectedInstruments; trackBy: trackByInstrument" class="inline-flex items-center gap-2 rounded-full bg-blue-50 px-3 py-1 text-sm font-medium text-blue-700">
        {{ item.name }}
        <button *ngIf="isEditing" type="button" (click)="removeInstrument(item.id)" class="text-blue-500 hover:text-blue-700">x</button>
      </span>
    </div>

    <ng-template #emptyState>
      <div class="mt-5 rounded-2xl border border-dashed border-zinc-300 bg-zinc-50 px-6 py-10 text-center text-sm text-zinc-500">
        No instruments selected yet.
      </div>
    </ng-template>
  </div>
</div>
