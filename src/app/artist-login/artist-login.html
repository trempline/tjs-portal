<div class="min-h-screen bg-zinc-100">
  <div class="mx-auto flex min-h-screen w-full max-w-md items-center px-6 py-12">
    <div class="w-full rounded-2xl border border-zinc-200 bg-white p-8 shadow-sm">
      <div class="mb-8">
        <p class="text-sm font-semibold uppercase tracking-[0.24em] text-red-600">Artist Workspace</p>
        <h1 class="mt-3 text-3xl font-bold text-zinc-900">Artist Login</h1>
        <p class="mt-2 text-sm text-zinc-500">Sign in to manage your profile, media, requests, availability, and events.</p>
      </div>

      <form class="space-y-5" (ngSubmit)="onSubmit()">
        <div class="space-y-2">
          <label for="artist-email" class="text-sm font-medium text-zinc-700">Email</label>
          <input
            id="artist-email"
            name="email"
            type="email"
            [(ngModel)]="credentials.email"
            class="w-full rounded-xl border border-zinc-300 px-4 py-3 text-sm text-zinc-900 outline-none transition-colors focus:border-red-500 focus:ring-2 focus:ring-red-100"
            placeholder="artist@example.com"
          />
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <label for="artist-password" class="text-sm font-medium text-zinc-700">Password</label>
          </div>
          <div class="relative">
            <input
              id="artist-password"
              name="password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="credentials.password"
              class="w-full rounded-xl border border-zinc-300 px-4 py-3 pr-12 text-sm text-zinc-900 outline-none transition-colors focus:border-red-500 focus:ring-2 focus:ring-red-100"
              placeholder="Enter your password"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute inset-y-0 right-3 flex items-center text-zinc-400 transition-colors hover:text-zinc-600"
            >
              <span class="text-xs font-medium">{{ showPassword ? 'Hide' : 'Show' }}</span>
            </button>
          </div>
        </div>

        <div *ngIf="errorMessage" class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
          {{ errorMessage }}
        </div>

        <button
          type="submit"
          [disabled]="isLoading"
          class="inline-flex w-full items-center justify-center rounded-xl bg-red-600 px-4 py-3 text-sm font-semibold text-white transition-colors hover:bg-red-700 disabled:cursor-not-allowed disabled:opacity-60"
        >
          {{ isLoading ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>
    </div>
  </div>
</div>
